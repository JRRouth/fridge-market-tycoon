<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fridge Market Tycoon - Global Rankings</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background-color: #0b0f19;
            color: #e2e8f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: linear-gradient(145deg, #131c2e, #1b2640);
            border: 1px solid #243557;
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 0.5rem;
            color: #ffffff;
            letter-spacing: 0.5px;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #f59e0b;
            text-align: center;
            margin-bottom: 2rem;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .leaderboard-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .row {
            display: flex;
            align-items: center;
            padding: 1rem;
            background: #111827;
            border-radius: 12px;
            border: 1px solid #1f2937;
            transition: all 0.2s ease;
        }

        .row:hover {
            transform: scale(1.02);
            border-color: #3b82f6;
            background: #131c3a;
        }

        .rank {
            font-weight: bold;
            width: 40px;
            color: #64748b;
        }

        .name {
            flex-grow: 1;
            font-weight: 500;
            color: #e2e8f0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .score {
            font-family: monospace;
            font-weight: bold;
            color: #10b981;
        }

        /* Top 3 Aesthetic Accents */
        .rank-1 { border-color: rgba(245, 158, 11, 0.4); background: rgba(245, 158, 11, 0.03); }
        .rank-1 .rank { color: #f59e0b; }
        
        .rank-2 { border-color: rgba(148, 163, 184, 0.4); background: rgba(148, 163, 184, 0.03); }
        .rank-2 .rank { color: #94a3b8; }

        .rank-3 { border-color: rgba(180, 83, 9, 0.4); background: rgba(180, 83, 9, 0.03); }
        .rank-3 .rank { color: #b45309; }

        .back-btn {
            display: inline-block;
            margin-top: 2rem;
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: bold;
            transition: color 0.2s;
        }

        .back-btn:hover {
            color: #3b82f6;
        }

        .loading {
            text-align: center;
            color: #64748b;
            padding: 2rem;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Global Rankings</h1>
        <div class="subtitle">Fridge Market Tycoon Pro</div>

        <div id="leaderboard" class="leaderboard-list">
            <div class="loading">Connecting data pipeline rows...</div>
        </div>

        <center><a href="./index.html" class="back-btn">← Back to Market Desk</a></center>
    </div>

    <script>
        // Directly maps your verified production credentials
        const SUPABASE_URL = "https://jypzclhjorqfddwjspiw.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5cHpjbGhqb3JxZmRkd2pzcGl3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyNzYzOTUsImV4cCI6MjA5Nzg1MjM5NX0.MxC1e7ReQjG3ms3CCTPHBb3jONTUZyoSnRtHhFD3tyQ";
        
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function loadLeaderboard() {
            const container = document.getElementById('leaderboard');
            
            // Targets your capitalized table schema 'Leaderboard'
            const { data, error } = await _supabase
                .from('Leaderboard') 
                .select('username, high_score')
                .order('high_score', { ascending: false })
                .limit(25);

            if (error) {
                console.error(error);
                container.innerHTML = '<div class="loading" style="color: #ef4444;">Failed to read pipeline records.</div>';
                return;
            }

            if (data.length === 0) {
                container.innerHTML = '<div class="loading">No scores logged in this sector yet.</div>';
                return;
            }

            container.innerHTML = data.map((player, index) => {
                const rank = index + 1;
                let rankClass = '';
                if (rank <= 3) rankClass = `rank-${rank}`;

                return `
                    <div class="row ${rankClass}">
                        <span class="rank">#${rank}</span>
                        <span class="name">${escapeHTML(player.username)}</span>
                        <span class="score">$${Number(player.high_score).toLocaleString()}</span>
                    </div>
                `;
            }).join('');
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }

        loadLeaderboard();
    </script>
</body>
</html>
